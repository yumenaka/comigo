version: "2"
sql:
  - engine: "sqlite"
    queries: "sqlc/query.sql"
    schema: "sqlc/schema.sql"
    gen:
      go:
        package: "sqlc"
        out: "sqlc"
  - engine: "postgresql"
    queries: "sqlc/postgres/query.sql"
    schema: "sqlc/postgres/schema.sql"
    gen:
      go:
        package: "postgres"
        out: "sqlc/postgres"
        sql_package: "database/sql"
